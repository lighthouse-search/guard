name: Deploy config creator to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "config-creator/**"
      - ".github/workflows/deploy-config-creator.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: config-creator/package-lock.json

      - name: Install dependencies
        working-directory: config-creator
        run: npm ci

      - name: Build
        working-directory: config-creator
        # /guard matches the repo name — this produces lighthouse-search.github.io/guard
        # Remove or change NEXT_PUBLIC_BASE_PATH if you configure a custom domain.
        env:
          NEXT_PUBLIC_BASE_PATH: /guard
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: config-creator/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
